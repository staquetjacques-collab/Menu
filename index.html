<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menus de Saison</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #F5F0E8; color: #2C2416; max-width: 430px; margin: 0 auto; }

.header { background: #2C2416; padding: 18px 16px; position: sticky; top: 0; z-index: 10; }
.header h1 { color: #F5F0E8; font-size: 22px; }
.header h1 span { color: #A8B870; font-style: italic; }
.badge { display: inline-block; background: #7A8C4F; color: white; font-size: 10px; font-weight: bold; padding: 3px 10px; border-radius: 20px; margin-top: 6px; text-transform: uppercase; letter-spacing: 1px; }

.section { background: #EDE5D0; padding: 10px 14px; border-bottom: 1px solid rgba(44,36,22,0.12); }
.section-label { font-size: 9px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: #5C4E36; margin-bottom: 6px; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { background: #E8EED8; border: 1px solid rgba(120,140,79,0.3); font-size: 10px; padding: 2px 7px; border-radius: 10px; }
.tag.fruit { background: #FEF0E0; border-color: rgba(200,119,58,0.3); }



.content { padding: 0 12px 80px; }

.card { background: #FDFAF3; border: 1px solid rgba(44,36,22,0.12); border-radius: 12px; padding: 12px; margin-top: 12px; }
.card-label { font-size: 9px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; color: #5C4E36; margin-bottom: 8px; }

.row { display: flex; gap: 6px; margin-bottom: 6px; }
.row input, .row select { flex: 1; background: #EDE5D0; border: 1px solid rgba(44,36,22,0.15); border-radius: 8px; padding: 8px 10px; font-size: 12px; color: #2C2416; outline: none; }

.prefs { display: flex; gap: 6px; margin-top: 10px; }
.pref-btn { flex: 1; background: #FDFAF3; border: 1.5px solid rgba(44,36,22,0.15); border-radius: 10px; padding: 7px 2px; font-size: 10px; font-weight: bold; color: #5C4E36; cursor: pointer; text-align: center; text-transform: uppercase; }
.pref-btn.active { background: #7A8C4F; border-color: #7A8C4F; color: white; }

.btn-main { width: 100%; background: #2C2416; color: #F5F0E8; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-style: italic; cursor: pointer; margin-top: 12px; }
.btn-main:active { opacity: 0.85; }

.loading { display: none; text-align: center; padding: 30px; color: #5C4E36; font-style: italic; }
.loading.on { display: block; }
.error { display: none; background: #FFF5F0; border: 1px solid #F0C0A0; border-radius: 10px; padding: 12px; margin-top: 12px; font-size: 13px; color: #8B4513; }
.error.on { display: block; }

.week { display: none; margin-top: 14px; }
.week.on { display: block; }

.day-card { background: #FDFAF3; border: 1px solid rgba(44,36,22,0.12); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
.day-head { background: #EDE5D0; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(44,36,22,0.12); }
.day-head strong { font-size: 14px; }

.meal-slot { padding: 10px 12px; }
.meal-label { font-size: 9px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; color: #5C4E36; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
.meal-label .dot { width: 6px; height: 6px; border-radius: 50%; background: #7A8C4F; display: inline-block; }
.meal-label.diner .dot { background: #C8773A; }
.meal-divider { height: 1px; background: rgba(44,36,22,0.10); margin: 0 12px; }

.stack { position: relative; height: 175px; margin-bottom: 6px; }
.stack::before, .stack::after { content: ''; position: absolute; left: 4px; right: 4px; border-radius: 10px; background: #EDE5D0; border: 1px solid rgba(44,36,22,0.12); }
.stack::before { top: 8px; bottom: -4px; z-index: 1; opacity: 0.5; }
.stack::after  { top: 4px; bottom: -2px; z-index: 2; opacity: 0.75; }

.proposal { position: absolute; inset: 0; z-index: 3; background: #FDFAF3; border: 1.5px solid rgba(44,36,22,0.15); border-radius: 10px; padding: 8px 10px; display: flex; flex-direction: column; gap: 3px; overflow: hidden; user-select: none; }
.proposal.go-left  { animation: goLeft  0.3s ease forwards; }
.proposal.go-right { animation: goRight 0.3s ease forwards; }
@keyframes goLeft  { to { transform: translateX(-130%) rotate(-15deg); opacity: 0; } }
@keyframes goRight { to { transform: translateX(130%)  rotate(15deg);  opacity: 0; } }

.stamp { position: absolute; top: 8px; font-size: 11px; font-weight: 900; padding: 2px 8px; border-radius: 5px; border: 2px solid; opacity: 0; pointer-events: none; z-index: 10; }
.stamp.no  { right: 8px; color: #E05252; border-color: #E05252; }
.stamp.yes { left:  8px; color: #4CAF82; border-color: #4CAF82; }

.counter { font-size: 9px; color: #5C4E36; text-align: right; font-weight: bold; }
.p-row { display: flex; gap: 5px; align-items: flex-start; margin-bottom: 2px; }
.p-icon { font-size: 11px; width: 14px; flex-shrink: 0; }
.p-name { font-size: 11px; font-weight: bold; line-height: 1.2; }
.p-desc { font-size: 10px; color: #5C4E36; line-height: 1.2; }
.badges { display: flex; gap: 3px; margin-top: 2px; flex-wrap: wrap; }
.b-prot { font-size: 9px; font-weight: bold; background: #FDE8D8; color: #9B4820; padding: 1px 5px; border-radius: 7px; }
.b-fec  { font-size: 9px; font-weight: bold; background: #EEE8D5; color: #6B5B2E; padding: 1px 5px; border-radius: 7px; }

.actions { display: flex; justify-content: center; gap: 20px; padding: 4px 0 2px; }
.btn-no, .btn-yes { width: 48px; height: 48px; border-radius: 50%; border: none; font-size: 18px; cursor: pointer; font-weight: bold; }
.btn-no  { background: white; color: #E05252; border: 2px solid #F5C0C0; }
.btn-yes { background: white; color: #4CAF82; border: 2px solid #B0E0C8; }

.accepted { background: #F0FAF4; border: 1.5px solid #B0E0C8; border-radius: 10px; padding: 9px 11px; position: relative; }
.accepted .check { position: absolute; top: 7px; right: 9px; color: #4CAF82; font-weight: bold; }
.accepted .change { font-size: 10px; color: #5C4E36; text-decoration: underline; cursor: pointer; text-align: right; margin-top: 4px; }
.exhausted { background: #FFF8F0; border: 1.5px solid #F0C0A0; border-radius: 10px; padding: 12px; text-align: center; color: #C8773A; font-size: 12px; font-weight: bold; line-height: 1.5; }

.tab-bar { display: flex; gap: 8px; margin-top: 14px; }
.tab-btn { flex: 1; background: #EDE5D0; border: 1.5px solid rgba(44,36,22,0.15); border-radius: 10px; padding: 9px; font-size: 12px; font-weight: bold; color: #5C4E36; cursor: pointer; text-align: center; }
.tab-btn.active { background: #2C2416; border-color: #2C2416; color: #F5F0E8; }
.tab-panel { margin-top: 10px; }

.shop-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; }
.shop-cat { margin-bottom: 10px; }
.shop-cat-label { font-size: 9px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; color: #5C4E36; margin-bottom: 5px; }
.shop-items { display: flex; flex-wrap: wrap; gap: 4px; }
.shop-item { background: #EDE5D0; font-size: 11px; padding: 3px 9px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
.shop-item.done { text-decoration: line-through; opacity: 0.4; background: transparent; border-color: rgba(44,36,22,0.15); }

.rec-card { background: #FDFAF3; border: 1px solid rgba(44,36,22,0.12); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.rec-head { background: #EDE5D0; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(44,36,22,0.12); font-size: 9px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; color: #5C4E36; }
.rec-body { padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
.rec-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.rec-name { font-size: 13px; font-weight: bold; }
.rec-sub  { font-size: 10px; color: #5C4E36; }
.btn-rec  { background: #2C2416; color: #F5F0E8; border: none; border-radius: 7px; padding: 6px 11px; font-size: 11px; font-weight: bold; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.rec-empty { text-align: center; padding: 24px; color: #5C4E36; font-size: 13px; font-style: italic; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(44,36,22,0.5); z-index: 1000; align-items: flex-end; }
.modal-bg.on { display: flex; }
.modal-box { background: #F5F0E8; width: 100%; max-width: 430px; margin: 0 auto; border-radius: 18px 18px 0 0; max-height: 88vh; overflow-y: auto; padding: 18px 16px 40px; }
.modal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.modal-title { font-size: 18px; font-weight: bold; flex: 1; padding-right: 10px; line-height: 1.2; }
.modal-close { background: #EDE5D0; border: 1px solid rgba(44,36,22,0.15); border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 13px; flex-shrink: 0; }

.conv-row { display: flex; align-items: center; justify-content: space-between; background: #EDE5D0; border-radius: 10px; padding: 9px 12px; margin-bottom: 14px; border: 1px solid rgba(44,36,22,0.15); }
.conv-label { font-size: 13px; font-weight: bold; }
.conv-step { display: flex; align-items: center; gap: 0; }
.conv-step button { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid rgba(44,36,22,0.15); background: #FDFAF3; font-size: 18px; font-weight: bold; cursor: pointer; color: #2C2416; }
.conv-step span { font-size: 20px; font-weight: bold; min-width: 38px; text-align: center; }

.rec-loading { display: none; text-align: center; padding: 24px; color: #5C4E36; font-style: italic; }
.rec-section { margin-bottom: 16px; }
.rec-section-title { font-size: 9px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: #5C4E36; margin-bottom: 8px; border-bottom: 1px solid rgba(44,36,22,0.12); padding-bottom: 4px; }
.rec-timing { font-size: 10px; color: #5C4E36; margin-bottom: 8px; }
.ing-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(44,36,22,0.06); font-size: 13px; }
.ing-row:last-child { border: none; }
.ing-qty { font-weight: bold; color: #7A8C4F; font-size: 12px; }
.step-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
.step-num { width: 22px; height: 22px; border-radius: 50%; background: #2C2416; color: #F5F0E8; font-size: 11px; font-weight: bold; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
.step-txt { font-size: 13px; line-height: 1.5; flex: 1; }
.tip { background: #F0FAF4; border: 1px solid #B0E0C8; border-radius: 8px; padding: 9px 11px; font-size: 12px; color: #2A6040; line-height: 1.5; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>Menus de <span>Saison</span></h1>
  <div class="badge" id="moisBadge">...</div>
</div>

<div class="section" id="produitsSection">
  <div class="section-label">Produits du mois</div>
  <div class="tags" id="produitsTags"></div>
</div>



<div class="content">

  <div class="card">
    <div class="card-label">Cle API Groq</div>
    <div class="row">
      <input type="password" id="apiInput" placeholder="gsk_..." />
      <button onclick="saveKey()" style="flex:0;background:#2C2416;color:#F5F0E8;border:none;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:bold;cursor:pointer;">OK</button>
    </div>
    <div id="keyStatus" style="font-size:11px;color:#7A8C4F;margin-top:4px;font-weight:bold;"></div>
  </div>

  <div class="prefs">
    <button class="pref-btn active" data-p="omnivore" onclick="setPref(this)">Omni</button>
    <button class="pref-btn" data-p="vegetarien" onclick="setPref(this)">Vege</button>
    <button class="pref-btn" data-p="vegan" onclick="setPref(this)">Vegan</button>
    <button class="pref-btn" data-p="sansgluten" onclick="setPref(this)">S.Glut</button>
  </div>

  <button class="btn-main" onclick="genMenu()">Generer mon menu de la semaine</button>

  <div class="loading" id="loading">Composition des menus en cours...</div>
  <div class="error" id="erreur"></div>

  <div class="week" id="week">
    <div id="daysGrid"></div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="courses" onclick="goTab('courses',this)">Courses</button>
      <button class="tab-btn" data-tab="recettes" onclick="goTab('recettes',this)">Recettes</button>
    </div>
    <div id="tab-courses" class="tab-panel"><div id="shopList"></div></div>
    <div id="tab-recettes" class="tab-panel" style="display:none"><div id="recList"></div></div>
  </div>

</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">X</button>
    </div>
    <div class="conv-row">
      <div class="conv-label">Convives</div>
      <div class="conv-step">
        <button onclick="changeConv(-1)">-</button>
        <span id="convCount">4</span>
        <button onclick="changeConv(1)">+</button>
      </div>
    </div>
    <div class="rec-loading" id="recLoading">Redaction de la recette...</div>
    <div id="recContent"></div>
  </div>
</div>

<script>
var MOIS = {
  1:{n:"Janvier",leg:["Chou","Poireau","Carotte","Panais","Betterave","Endive","Topinambour","Celeri","Mache","Pomme de terre"],fr:["Citron","Clementine","Mandarine","Orange","Pomme","Poire","Kiwi"]},
  2:{n:"Fevrier",leg:["Chou","Chou-fleur","Brocoli","Carotte","Navet","Endive","Oignon"],fr:["Citron","Mandarine","Orange","Pomme","Poire","Kiwi"]},
  3:{n:"Mars",leg:["Chou","Carotte","Endive","Asperge","Epinard","Radis","Poireau","Oignon"],fr:["Citron","Pomme","Poire","Kiwi","Orange"]},
  4:{n:"Avril",leg:["Asperge","Epinard","Radis","Laitue","Mesclun","Petits pois","Ail","Oignon","Celeri","Navet","Carotte"],fr:["Pomme","Fraise","Rhubarbe"]},
  5:{n:"Mai",leg:["Courgette","Concombre","Aubergine","Tomate","Laitue","Petits pois","Artichaut","Carotte","Radis"],fr:["Cerise","Fraise","Rhubarbe"]},
  6:{n:"Juin",leg:["Tomate","Poivron","Concombre","Courgette","Roquette","Petits pois","Artichaut","Pomme de terre","Radis"],fr:["Cerise","Fraise","Framboise","Groseille"]},
  7:{n:"Juillet",leg:["Tomate","Aubergine","Courgette","Poivron","Salade","Fenouil","Brocoli","Haricot vert"],fr:["Abricot","Peche","Nectarine","Cerise","Melon","Framboise","Mure"]},
  8:{n:"Aout",leg:["Tomate","Poivron","Aubergine","Haricot vert","Courgette","Pomme de terre","Fenouil"],fr:["Melon","Pasteque","Peche","Prune","Raisin","Figue","Framboise"]},
  9:{n:"Septembre",leg:["Tomate","Courgette","Poivron","Aubergine","Courge","Potiron","Radis","Mais"],fr:["Pomme","Poire","Raisin","Figue","Prune","Myrtille"]},
  10:{n:"Octobre",leg:["Courge","Potiron","Potimarron","Butternut","Betterave","Carotte","Navet","Poireau","Celeri","Chou"],fr:["Pomme","Poire","Raisin","Coing","Chataigne","Noix"]},
  11:{n:"Novembre",leg:["Chou","Poireau","Carotte","Navet","Betterave","Endive","Courge","Celeri","Mache"],fr:["Pomme","Poire","Kiwi","Coing","Noix","Clementine"]},
  12:{n:"Decembre",leg:["Chou","Poireau","Navet","Carotte","Betterave","Endive","Courge","Mache"],fr:["Pomme","Kiwi","Clementine","Orange","Mandarine"]}
};
var JOURS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];

var pref = "omnivore";
var apiKey = localStorage.getItem("groq_key") || "";
var menu = null;
var sel = {};
var recCtx = null;
var convives = 4;
var month = new Date().getMonth() + 1;

function init() {
  var d = MOIS[month];
  document.getElementById("moisBadge").textContent = d.n + " " + new Date().getFullYear();
  var c = document.getElementById("produitsTags");
  d.leg.slice(0,8).forEach(function(l){ var t = document.createElement("span"); t.className = "tag"; t.textContent = l; c.appendChild(t); });
  d.fr.slice(0,5).forEach(function(f){ var t = document.createElement("span"); t.className = "tag fruit"; t.textContent = f; c.appendChild(t); });
  if (apiKey) { document.getElementById("keyStatus").textContent = "Cle enregistree"; document.getElementById("apiInput").value = "gsk_................"; }
}

function saveKey() {
  var v = document.getElementById("apiInput").value.trim();
  if (v && v.indexOf("gsk_") === 0) {
    apiKey = v; localStorage.setItem("groq_key", v);
    document.getElementById("keyStatus").textContent = "Cle enregistree";
    document.getElementById("keyStatus").style.color = "#7A8C4F";
    document.getElementById("apiInput").value = "gsk_................";
  } else {
    document.getElementById("keyStatus").textContent = "Cle invalide (doit commencer par gsk_)";
    document.getElementById("keyStatus").style.color = "#C84040";
  }
}

function setPref(btn) {
  document.querySelectorAll(".pref-btn").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active"); pref = btn.dataset.p;
}

async function genMenu() {
  if (!apiKey) { showErr("Entrez votre cle API Groq."); return; }
  var d = MOIS[month];
  document.getElementById("loading").className = "loading on";
  document.getElementById("erreur").className = "error";
  document.getElementById("week").className = "week";
  sel = {};

  var prompt = "Tu es un chef cuisinier francais specialise dans la cuisine de saison.\n\n"
    + "Genere un menu pour 7 jours (lundi au dimanche).\n"
    + "Pour chaque jour: un dejeuner ET un diner.\n"
    + "Pour chaque repas: EXACTEMENT 3 propositions differentes.\n"
    + "Chaque proposition: 1 entree + 1 plat (avec proteine et feculent) + 1 dessert.\n\n"
    + "Mois: " + d.n + "\n"
    + "Legumes de saison: " + d.leg.join(", ") + "\n"
    + "Fruits de saison: " + d.fr.join(", ") + "\n"
    + "Regime: " + pref + "\n"
    + "\nRegles:\n"
    + "- Varier proteines et feculents\n"
    + "- Plats simples, typiquement francais\n"
    + "- Noms courts (max 5 mots)\n\n"
    + 'Reponds UNIQUEMENT en JSON valide:\n'
    + '{"semaine":[{"jour":"Lundi","dejeuner":[{"entree":{"nom":"...","desc":"..."},"plat":{"nom":"...","desc":"...","proteine":"...","feculent":"...","ings":["..."]},"dessert":{"nom":"..."}}],"diner":[...3 propositions...]}],"courses":{"legumes":["..."],"fruits":["..."],"proteines":["..."],"feculents":["..."],"epicerie":["..."]}}';

  try {
    var res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
      body: JSON.stringify({ model: "llama-3.3-70b-versatile", max_tokens: 8000, temperature: 0.85, response_format: { type: "json_object" }, messages: [{ role: "user", content: prompt }] })
    });
    if (!res.ok) { var e = await res.json(); throw new Error((e.error && e.error.message) || "Erreur " + res.status); }
    var data = await res.json();
    var raw = data.choices[0].message.content.trim().replace(/```json|```/g, "").trim();
    menu = JSON.parse(raw);
    document.getElementById("loading").className = "loading";
    renderWeek();
  } catch(e) {
    document.getElementById("loading").className = "loading";
    showErr("Erreur: " + e.message);
  }
}

function renderWeek() {
  var grid = document.getElementById("daysGrid");
  grid.innerHTML = "";
  menu.semaine.forEach(function(day, di) {
    if (!sel[di]) sel[di] = { dejeuner: 0, diner: 0 };
    var card = document.createElement("div");
    card.className = "day-card";
    card.innerHTML = '<div class="day-head"><strong>' + day.jour + '</strong><span>' + (["Lu","Ma","Me","Je","Ve","Sa","Di"][di]) + '</span></div>'
      + '<div class="meal-slot" id="sl-' + di + '-d"><div class="meal-label"><span class="dot"></span> Dejeuner</div>' + renderSlot(day.dejeuner, di, "d") + '</div>'
      + '<div class="meal-divider"></div>'
      + '<div class="meal-slot" id="sl-' + di + '-s"><div class="meal-label diner"><span class="dot"></span> Diner</div>' + renderSlot(day.diner, di, "s") + '</div>';
    grid.appendChild(card);
  });
  document.getElementById("week").className = "week on";
  goTab("courses", document.querySelector('[data-tab="courses"]'));
  bindSwipe();
}

function renderSlot(props, di, mt) {
  if (!props || !props.length) return '<div class="exhausted">Aucune proposition</div>';
  var state = sel[di][mt];
  if (state === "ok") {
    var idx = sel[di][mt + "_i"] || 0;
    return renderOk(props[idx], di, mt);
  }
  if (state === "out") return '<div class="exhausted">Toutes rejetees ! Regenerez le menu.</div>';
  var idx = typeof state === "number" ? state : 0;
  if (idx >= props.length) return '<div class="exhausted">Toutes rejetees !</div>';
  var p = props[idx]; var total = props.length;
  var dots = "";
  for (var i = 0; i < total; i++) dots += '<span style="width:6px;height:6px;border-radius:50%;display:inline-block;margin:0 2px;background:' + (i === idx ? "#2C2416" : "rgba(44,36,22,0.2)") + '"></span>';
  return '<div class="stack" data-di="' + di + '" data-mt="' + mt + '">'
    + '<div class="proposal" id="pr-' + di + '-' + mt + '">'
    + '<div class="stamp no">Non</div><div class="stamp yes">Oui</div>'
    + '<div class="counter">' + dots + ' ' + (idx+1) + '/' + total + '</div>'
    + '<div class="p-row"><span class="p-icon">S</span><div><div class="p-name">' + (p.entree ? p.entree.nom : "") + '</div><div class="p-desc">' + (p.entree ? p.entree.desc : "") + '</div></div></div>'
    + '<div class="p-row"><span class="p-icon">P</span><div><div class="p-name">' + (p.plat ? p.plat.nom : "") + '</div><div class="p-desc">' + (p.plat ? p.plat.desc : "") + '</div>'
    + '<div class="badges">' + (p.plat && p.plat.proteine ? '<span class="b-prot">' + p.plat.proteine + '</span>' : '') + (p.plat && p.plat.feculent ? '<span class="b-fec">' + p.plat.feculent + '</span>' : '') + '</div></div></div>'
    + '<div class="p-row"><span class="p-icon">D</span><div><div class="p-name">' + (p.dessert ? p.dessert.nom : "") + '</div></div></div>'
    + '</div></div>'
    + '<div class="actions"><button class="btn-no" onclick="doNo(' + di + ',\'' + mt + '\')">X</button><button class="btn-yes" onclick="doYes(' + di + ',\'' + mt + '\')">V</button></div>';
}

function renderOk(p, di, mt) {
  if (!p) return "";
  return '<div class="accepted"><span class="check">V</span>'
    + '<div class="p-row"><span class="p-icon">S</span><div><div class="p-name">' + (p.entree ? p.entree.nom : "") + '</div></div></div>'
    + '<div class="p-row"><span class="p-icon">P</span><div><div class="p-name">' + (p.plat ? p.plat.nom : "") + '</div>'
    + '<div class="badges">' + (p.plat && p.plat.proteine ? '<span class="b-prot">' + p.plat.proteine + '</span>' : '') + (p.plat && p.plat.feculent ? '<span class="b-fec">' + p.plat.feculent + '</span>' : '') + '</div></div></div>'
    + '<div class="p-row"><span class="p-icon">D</span><div><div class="p-name">' + (p.dessert ? p.dessert.nom : "") + '</div></div></div>'
    + '<div class="change" onclick="doReset(' + di + ',\'' + mt + '\')">Changer</div>'
    + '</div>';
}

function doYes(di, mt) {
  var idx = typeof sel[di][mt] === "number" ? sel[di][mt] : 0;
  anim(di, mt, "right", function(){ sel[di][mt] = "ok"; sel[di][mt + "_i"] = idx; refresh(di, mt); });
}
function doNo(di, mt) {
  var props = menu.semaine[di][mt === "d" ? "dejeuner" : "diner"];
  var idx = typeof sel[di][mt] === "number" ? sel[di][mt] : 0;
  anim(di, mt, "left", function(){ var n = idx + 1; sel[di][mt] = n >= props.length ? "out" : n; refresh(di, mt); });
}
function doReset(di, mt) { sel[di][mt] = 0; sel[di][mt + "_i"] = undefined; refresh(di, mt); }

function anim(di, mt, dir, cb) {
  var card = document.getElementById("pr-" + di + "-" + mt);
  if (!card) { cb(); return; }
  var stamp = card.querySelector(".stamp." + (dir === "left" ? "no" : "yes"));
  if (stamp) stamp.style.opacity = "1";
  card.classList.add(dir === "left" ? "go-left" : "go-right");
  setTimeout(cb, 320);
}
function refresh(di, mt) {
  var mealType = mt === "d" ? "dejeuner" : "diner";
  var slot = document.getElementById("sl-" + di + "-" + mt);
  if (!slot) return;
  var lbl = slot.querySelector(".meal-label").outerHTML;
  slot.innerHTML = lbl + renderSlot(menu.semaine[di][mealType], di, mt);
  bindSwipe();
}

function bindSwipe() {
  document.querySelectorAll(".proposal").forEach(function(card) {
    if (card._sw) return; card._sw = true;
    var sx = 0, sy = 0;
    card.addEventListener("touchstart", function(e){ sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
    card.addEventListener("touchmove", function(e){
      var dx = e.touches[0].clientX - sx, dy = e.touches[0].clientY - sy;
      if (Math.abs(dx) > Math.abs(dy)) {
        card.style.transform = "translateX(" + dx + "px) rotate(" + (dx * 0.05) + "deg)";
        var sn = card.querySelector(".stamp.no"), sy2 = card.querySelector(".stamp.yes");
        if (sn) sn.style.opacity = dx < -20 ? Math.min(1, Math.abs(dx)/70) : "0";
        if (sy2) sy2.style.opacity = dx > 20 ? Math.min(1, dx/70) : "0";
      }
    }, { passive: true });
    card.addEventListener("touchend", function(e){
      var dx = e.changedTouches[0].clientX - sx;
      var stack = card.closest(".stack"); if (!stack) return;
      var di = parseInt(stack.dataset.di), mt = stack.dataset.mt;
      if (dx < -65) doNo(di, mt);
      else if (dx > 65) doYes(di, mt);
      else { card.style.transform = ""; card.querySelectorAll(".stamp").forEach(function(s){ s.style.opacity = "0"; }); }
    }, { passive: true });
  });
}

function goTab(tab, btn) {
  document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.remove("active"); });
  if (btn) btn.classList.add("active");
  document.getElementById("tab-courses").style.display = tab === "courses" ? "block" : "none";
  document.getElementById("tab-recettes").style.display = tab === "recettes" ? "block" : "none";
  if (tab === "courses") renderShop();
  if (tab === "recettes") renderRec();
}

function renderShop() {
  if (!menu || !menu.courses) return;
  var lc = menu.courses;
  var cats = [["Legumes", lc.legumes||[]], ["Fruits", lc.fruits||[]], ["Proteines", lc.proteines||[]], ["Feculents", lc.feculents||[]], ["Epicerie", lc.epicerie||[]]];
  var sl = document.getElementById("shopList"); sl.innerHTML = '<div class="shop-title">Liste de courses</div>';
  cats.forEach(function(cat) {
    if (!cat[1].length) return;
    var div = document.createElement("div"); div.className = "shop-cat";
    div.innerHTML = '<div class="shop-cat-label">' + cat[0] + '</div><div class="shop-items">' + cat[1].map(function(i){ return '<span class="shop-item" onclick="this.classList.toggle(\'done\')">' + i + '</span>'; }).join("") + '</div>';
    sl.appendChild(div);
  });
}

function renderRec() {
  var c = document.getElementById("recList");
  if (!menu) { c.innerHTML = '<div class="rec-empty">Generez un menu d abord.</div>'; return; }
  var acc = [];
  menu.semaine.forEach(function(day, di) {
    [["d","dejeuner","Dejeuner"],["s","diner","Diner"]].forEach(function(pair) {
      var mt = pair[0], mealKey = pair[1], label = pair[2];
      if (sel[di] && sel[di][mt] === "ok") {
        var idx = sel[di][mt + "_i"] || 0;
        var p = day[mealKey] && day[mealKey][idx];
        if (p && p.plat) acc.push({ jour: day.jour, label: label, p: p, di: di, mt: mt, idx: idx });
      }
    });
  });
  if (!acc.length) { c.innerHTML = '<div class="rec-empty">Validez des repas pour voir leurs recettes ici.</div>'; return; }
  c.innerHTML = "";
  acc.forEach(function(a) {
    var card = document.createElement("div"); card.className = "rec-card";
    var sub = [a.p.plat && a.p.plat.proteine, a.p.plat && a.p.plat.feculent].filter(Boolean).join(" / ");
    card.innerHTML = '<div class="rec-head"><span>' + a.jour + '</span><span>' + a.label + '</span></div>'
      + '<div class="rec-body"><div class="rec-row"><div><div class="rec-name">' + (a.p.plat ? a.p.plat.nom : "") + '</div>' + (sub ? '<div class="rec-sub">' + sub + '</div>' : '') + '</div>'
      + '<button class="btn-rec" onclick="openModal(' + a.di + ',\'' + a.mt + '\',' + a.idx + ')">Recette</button></div></div>';
    c.appendChild(card);
  });
}

function openModal(di, mt, idx) {
  var mealKey = mt === "d" ? "dejeuner" : "diner";
  var p = menu.semaine[di][mealKey][idx];
  recCtx = { di: di, mt: mt, idx: idx, p: p };
  document.getElementById("modalTitle").textContent = p.plat ? p.plat.nom : "Recette";
  document.getElementById("convCount").textContent = convives;
  document.getElementById("recContent").innerHTML = "";
  document.getElementById("recLoading").style.display = "none";
  document.getElementById("modalBg").className = "modal-bg on";
  fetchRec();
}
function closeModal() { document.getElementById("modalBg").className = "modal-bg"; recCtx = null; }
function changeConv(d) {
  convives = Math.max(1, Math.min(12, convives + d));
  document.getElementById("convCount").textContent = convives;
  if (recCtx) fetchRec();
}

async function fetchRec() {
  if (!recCtx || !apiKey) return;
  var p = recCtx.p; var d = MOIS[month];
  document.getElementById("recLoading").style.display = "block";
  document.getElementById("recContent").innerHTML = "";
  var prompt = "Tu es un chef cuisinier francais. Redige une recette complete pour " + convives + " convives.\n\n"
    + "Repas: Entree: " + (p.entree ? p.entree.nom : "") + " / Plat: " + (p.plat ? p.plat.nom : "") + " / Dessert: " + (p.dessert ? p.dessert.nom : "") + "\n"
    + "Proteine: " + (p.plat ? p.plat.proteine : "") + " | Feculent: " + (p.plat ? p.plat.feculent : "") + "\n"
    + "Mois: " + d.n + " | Regime: " + pref + "\n\n"
    + 'Reponds UNIQUEMENT en JSON:\n{"entree":{"nom":"...","ingredients":[{"nom":"...","qt":"..."}],"etapes":["..."]},"plat":{"nom":"...","prep":"...","cuisson":"...","ingredients":[{"nom":"...","qt":"..."}],"etapes":["..."],"astuce":"..."},"dessert":{"nom":"...","ingredients":[{"nom":"...","qt":"..."}],"etapes":["..."]}}';
  try {
    var res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
      body: JSON.stringify({ model: "llama-3.3-70b-versatile", max_tokens: 2000, temperature: 0.7, response_format: { type: "json_object" }, messages: [{ role: "user", content: prompt }] })
    });
    if (!res.ok) throw new Error("Erreur " + res.status);
    var data = await res.json();
    var raw = data.choices[0].message.content.trim().replace(/```json|```/g, "").trim();
    var rec = JSON.parse(raw);
    document.getElementById("recLoading").style.display = "none";
    showRec(rec);
  } catch(e) {
    document.getElementById("recLoading").style.display = "none";
    document.getElementById("recContent").innerHTML = '<div style="color:#C84040;padding:12px;font-size:13px;">Erreur: ' + e.message + '</div>';
  }
}

function showRec(rec) {
  var parts = [["entree","S - Entree"],["plat","P - Plat principal"],["dessert","D - Dessert"]];
  var html = "";
  parts.forEach(function(pt) {
    var r = rec[pt[0]]; if (!r) return;
    html += '<div class="rec-section">';
    html += '<div class="rec-section-title">' + pt[1] + '</div>';
    if (r.prep) html += '<div class="rec-timing">Prep: ' + r.prep + ' | Cuisson: ' + r.cuisson + '</div>';
    if (r.ingredients && r.ingredients.length) {
      r.ingredients.forEach(function(ing){ html += '<div class="ing-row"><span>' + ing.nom + '</span><span class="ing-qty">' + ing.qt + '</span></div>'; });
    }
    if (r.etapes && r.etapes.length) {
      html += '<div style="margin-top:10px">';
      r.etapes.forEach(function(s, i){ html += '<div class="step-row"><div class="step-num">' + (i+1) + '</div><div class="step-txt">' + s + '</div></div>'; });
      html += '</div>';
    }
    if (r.astuce) html += '<div class="tip">Astuce: ' + r.astuce + '</div>';
    html += '</div>';
  });
  document.getElementById("recContent").innerHTML = html;
}

function showErr(msg) { var el = document.getElementById("erreur"); el.textContent = msg; el.className = "error on"; }

init();
</script>
</body>
</html>
